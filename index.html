<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Solfeggio">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<title>Solfeggio Hz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--gold2:#e8cfa0;--bg:#0a0a0f;--muted:#5a5560;--fc:#c8a96e}
html{height:100%;background:var(--bg)}
body{
  min-height:100%;background:var(--bg);color:#e8e0d0;
  font-family:'Zen Kaku Gothic New',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:max(env(safe-area-inset-top),20px) 16px max(env(safe-area-inset-bottom),16px);
  overflow-x:hidden;overflow-y:auto;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% 30%,rgba(200,169,110,.06) 0%,transparent 65%);
}
.z{position:relative;z-index:1;width:100%;max-width:420px}

/* 周波数タブ */
.freq-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:20px 0 0}
.ft{
  background:transparent;border:1px solid #1e1e1e;color:var(--muted);
  font-family:'Cormorant Garamond',serif;font-size:14px;
  padding:6px 9px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;line-height:1.2;text-align:center;min-width:48px;
}
.ft small{display:block;font-size:9px;letter-spacing:.5px;margin-top:1px;opacity:.7;font-family:'Zen Kaku Gothic New',sans-serif}
.ft.on{border-color:var(--fc);color:var(--fc);background:rgba(200,169,110,.08)}

/* 周波数大表示 */
.freq-hero{text-align:center;margin:16px 0 0}
.fn{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(60px,15vw,100px);line-height:1;
  color:var(--fc);letter-spacing:-2px;transition:color .4s;
}
.fu{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,3vw,18px);letter-spacing:10px;color:var(--gold2);opacity:.6;margin-top:4px}
.fl{font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:8px;min-height:14px}

/* 棒人間 */
#stage{display:block;margin:6px auto}

/* 再生ボタン */
.play-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0}
#playBtn{
  width:106px;height:106px;border-radius:50%;background:transparent;
  border:1.5px solid var(--gold);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;outline:none;
  transition:background .3s,transform .15s;position:relative;
}
#playBtn:active{transform:scale(.92)}
#playBtn.on{background:rgba(200,169,110,.13)}
#playBtn::before,#playBtn::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:1px solid var(--gold);opacity:0;pointer-events:none;
}
#playBtn.on::before{animation:rpl 2.2s ease-out infinite}
#playBtn.on::after{animation:rpl 2.2s ease-out infinite .85s}
@keyframes rpl{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
.tri{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:18px solid var(--gold);margin-left:4px}
.sq{width:16px;height:16px;background:var(--gold);display:none}
#playBtn.on .tri{display:none}
#playBtn.on .sq{display:block}
#msg{font-size:10px;color:var(--muted);letter-spacing:2px;min-height:14px;margin-top:6px;text-align:center}

/* パネル共通 */
.panel{width:100%;max-width:420px;border:1px solid #1a1a1a;padding:14px 14px 16px;margin-top:12px}
.ptitle{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}

/* 音量 */
.lbl{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.vol-row{display:flex;align-items:center;gap:10px}
.vi{font-size:11px;color:var(--muted)}
input[type=range]{
  -webkit-appearance:none;flex:1;height:1px;outline:none;cursor:pointer;
  background:linear-gradient(to right,var(--gold) var(--p,75%),#252525 var(--p,75%));
}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--gold)}

/* BGMグリッド */
.bgm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.bb{
  background:transparent;border:1px solid #1e1e1e;color:var(--muted);
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:11px;
  padding:9px 8px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;text-align:left;line-height:1.5;
}
.bb b{display:block;color:#b8b0a8;font-size:12px;font-weight:300}
.bb small{display:block;font-size:10px;color:var(--muted);margin-top:1px}
.bb.on{border-color:var(--gold);background:rgba(200,169,110,.07)}
.bb.on b{color:var(--gold)}

/* タイマー */
.tbtns{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.tb{
  background:transparent;border:1px solid #1e1e1e;color:var(--muted);
  font-family:'Cormorant Garamond',serif;font-size:13px;padding:5px 11px;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.tb.on{border-color:var(--gold);color:var(--gold)}
.cd{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold2);letter-spacing:2px;min-height:28px;margin-top:8px;text-align:center}

/* フッター */
.foot{display:flex;gap:8px;margin:16px 0 4px;justify-content:center}
.fbtn{
  background:transparent;border:1px solid #1e1e1e;color:var(--muted);
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:10px;
  letter-spacing:2px;padding:7px 16px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.fbtn:active{border-color:var(--gold);color:var(--gold)}

/* iOSバナー */
#iosBanner{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#111118;border-top:1px solid #222;
  padding:16px 20px 28px;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
#iosBanner.show{transform:translateY(0)}
.iosT{font-size:12px;color:#e8e0d0;letter-spacing:2px;margin-bottom:10px}
.iosS{font-size:11px;color:var(--muted);line-height:2.2;letter-spacing:1px}
.iosS span{color:var(--gold2)}
.iosX{margin-top:12px;background:transparent;border:1px solid #333;color:var(--muted);font-size:10px;letter-spacing:2px;padding:7px 16px;cursor:pointer;width:100%}
</style>
</head>
<body>

<!-- 周波数タブ -->
<div class="freq-tabs z" id="freqTabs"></div>

<!-- 周波数表示 -->
<div class="freq-hero z">
  <div class="fn" id="fnNum">852</div>
  <div class="fu">H Z</div>
  <div class="fl" id="fnLabel">直感の覚醒 · Third Eye</div>
</div>

<!-- 棒人間 -->
<div class="z" style="max-width:420px">
  <canvas id="stage" width="280" height="80"></canvas>
</div>

<!-- 再生ボタン -->
<div class="play-wrap z">
  <button id="playBtn"><div class="tri"></div><div class="sq"></div></button>
  <div id="msg">タップして再生</div>
</div>

<!-- トーン音量 -->
<div class="panel z">
  <div class="ptitle">Tone Volume</div>
  <div class="vol-row">
    <span class="vi">🔇</span>
    <input type="range" id="volTone" min="0" max="100" value="75">
    <span class="vi">🔊</span>
  </div>
</div>

<!-- BGM -->
<div class="panel z">
  <div class="ptitle">Background Music</div>
  <div class="bgm-grid" id="bgmGrid"></div>
  <div style="margin-top:12px">
    <div class="lbl">BGM Volume</div>
    <div class="vol-row">
      <span class="vi">🔇</span>
      <input type="range" id="volBgm" min="0" max="100" value="40">
      <span class="vi">🔊</span>
    </div>
  </div>
</div>

<!-- タイマー -->
<div class="panel z">
  <div class="ptitle">Timer</div>
  <div class="tbtns">
    <button class="tb" data-min="5">5 min</button>
    <button class="tb" data-min="10">10 min</button>
    <button class="tb" data-min="20">20 min</button>
    <button class="tb" data-min="30">30 min</button>
    <button class="tb" data-min="60">60 min</button>
  </div>
  <div class="cd" id="cd"></div>
</div>

<!-- フッター -->
<div class="foot z">
  <button class="fbtn" id="addBtn">＋ ホーム画面に追加</button>
</div>

<!-- iOSバナー -->
<div id="iosBanner">
  <div class="iosT">ホーム画面に追加する方法</div>
  <div class="iosS">
    1. 画面下の <span>共有ボタン（□↑）</span> をタップ<br>
    2. <span>「ホーム画面に追加」</span> を選択<br>
    3. 右上の <span>「追加」</span> をタップ
  </div>
  <button class="iosX" id="iosClose">閉じる</button>
</div>

<script>
// ══ ソルフェジオ周波数 ══════════════════════
var FREQS=[
  {hz:174, name:'解放',  desc:'痛みの解放',         color:'#7788bb'},
  {hz:285, name:'修復',  desc:'組織の再生',          color:'#77aa99'},
  {hz:396, name:'罪責',  desc:'恐れ・罪悪感から解放', color:'#aa7777'},
  {hz:417, name:'変容',  desc:'変化の促進',          color:'#cc9955'},
  {hz:528, name:'奇跡',  desc:'愛の周波数・DNA修復',  color:'#77aa55'},
  {hz:639, name:'繋がり',desc:'人間関係の調和',       color:'#5588bb'},
  {hz:741, name:'覚醒',  desc:'表現・解毒',          color:'#8855aa'},
  {hz:852, name:'直感',  desc:'直感の覚醒',          color:'#c8a96e'},
  {hz:963, name:'神聖',  desc:'高次元との繋がり',     color:'#ccbbaa'},
];
var fi=7; // 852Hz

// ══ BGM定義 ════════════════════════════════
var BGMS=[
  {id:'none',  name:'なし',        desc:'BGMオフ'},
  {id:'rain',  name:'🌧 雨音',     desc:'自然・リラックス'},
  {id:'river', name:'🏞 川の音',   desc:'自然・集中'},
  {id:'wave',  name:'🌊 波音',     desc:'自然・瞑想'},
  {id:'white', name:'⬜ ホワイトノイズ', desc:'集中・睡眠'},
  {id:'brown', name:'🟫 ブラウンノイズ', desc:'深い集中'},
  {id:'green', name:'🟩 グリーンノイズ', desc:'自然・リラックス'},
  {id:'fire',  name:'🔥 焚き火',   desc:'温もり・瞑想'},
  {id:'bowl',  name:'🔔 シンギングボウル',desc:'瞑想・チャクラ'},
  {id:'forest',name:'🌲 森の音',   desc:'風・鳥・虫のみ'},
];
var curBgm='none';

// ══ 周波数タブ生成 ══════════════════════════
var tabWrap=document.getElementById('freqTabs');
FREQS.forEach(function(f,i){
  var b=document.createElement('button');
  b.className='ft'+(i===fi?' on':'');
  b.innerHTML='<b>'+f.hz+'</b><small>'+f.name+'</small>';
  b.addEventListener('click',function(){
    fi=i;
    document.querySelectorAll('.ft').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    applyFreq();
    if(isOn){stopTone();startTone();}
    if(isOn&&curBgm==='bowl'){stopBgm();startBgm('bowl');}
  });
  tabWrap.appendChild(b);
});
function applyFreq(){
  var f=FREQS[fi];
  document.getElementById('fnNum').textContent=f.hz;
  document.getElementById('fnNum').style.color=f.color;
  document.getElementById('fnLabel').textContent=f.name+' · '+f.desc;
  document.documentElement.style.setProperty('--fc',f.color);
}
applyFreq();

// ══ BGMボタン生成 ═══════════════════════════
var bgmWrap=document.getElementById('bgmGrid');
BGMS.forEach(function(b){
  var btn=document.createElement('button');
  btn.className='bb'+(b.id==='none'?' on':'');
  btn.dataset.id=b.id;
  btn.innerHTML='<b>'+b.name+'</b><small>'+b.desc+'</small>';
  btn.addEventListener('click',function(){
    document.querySelectorAll('.bb').forEach(function(x){x.classList.remove('on');});
    btn.classList.add('on');
    curBgm=b.id;
    if(isOn){stopBgm();if(curBgm!=='none')startBgm(curBgm);}
  });
  bgmWrap.appendChild(btn);
});

// ══ 釣り人アニメーション ══════════════════════
var stg=document.getElementById('stage'),sc=stg.getContext('2d');
var sT=0,isRun=false;

function ln(a,b){sc.beginPath();sc.moveTo(a.x,a.y);sc.lineTo(b.x,b.y);sc.stroke();}
function circle(x,y,r){sc.beginPath();sc.arc(x,y,r,0,Math.PI*2);sc.stroke();}
function fillCircle(x,y,r){sc.beginPath();sc.arc(x,y,r,0,Math.PI*2);sc.fill();}

function drawFisher(t, active){
  sc.clearRect(0,0,stg.width,stg.height);
  sc.lineCap='round'; sc.lineJoin='round';

  var col   = active ? FREQS[fi].color : '#4a4655';
  var colA  = active ? 'rgba(200,169,110,' : 'rgba(74,70,85,';
  var ph    = t * 0.008; // 非常にゆっくり

  // ━━ 背景：水面 ━━━━━━━━━━━━━━━━━━━━━━━━━
  // 水面グラデーション
  var wGrad = sc.createLinearGradient(0,58,0,82);
  wGrad.addColorStop(0, active?'rgba(40,80,120,0.28)':'rgba(40,50,70,0.18)');
  wGrad.addColorStop(1, active?'rgba(20,50,90,0.10)':'rgba(20,30,50,0.08)');
  sc.fillStyle=wGrad;
  sc.fillRect(0,58,280,24);

  // 水面のさざ波（3本・周期ずらし）
  sc.lineWidth=0.7;
  for(var wi=0;wi<3;wi++){
    sc.strokeStyle = active
      ? 'rgba(100,160,220,'+(0.18-wi*0.04)+')'
      : 'rgba(80,90,110,'+(0.12-wi*0.03)+')';
    sc.beginPath();
    for(var wx=0;wx<280;wx+=2){
      var wy=60+wi*5+Math.sin(wx*0.035+ph*2.5+wi*1.2)*1.4;
      wx===0?sc.moveTo(wx,wy):sc.lineTo(wx,wy);
    }
    sc.stroke();
  }

  // 岸辺のライン
  sc.strokeStyle = active ? 'rgba(160,130,80,0.35)' : 'rgba(80,75,85,0.25)';
  sc.lineWidth=2;
  sc.beginPath();
  sc.moveTo(30,58); sc.lineTo(170,58);
  sc.stroke();

  // ━━ 人物（px=105, 岸に座る） ━━━━━━━━━━━━━
  var px=105;
  // 呼吸：sin波でごくわずかに上下
  var br = Math.sin(ph*1.6)*1.0;

  sc.strokeStyle=col; sc.lineWidth=2;

  // 頭（少し前傾き）
  var hx=px+2, hy=24+br;
  circle(hx, hy, 7.5);

  // 首〜胴体（前傾姿勢）
  var nkX=px+1,  nkY=hy+7.5+br;
  var chX=px-1,  chY=nkY+10+br; // 胸
  var hpX=px-3,  hpY=chY+12+br; // 腰

  // 背骨（首〜胸〜腰）
  sc.beginPath(); sc.moveTo(nkX,nkY); sc.quadraticCurveTo(chX+2,chY,hpX,hpY); sc.stroke();

  // 右腕（竿を持ち上げ・肘を軽く曲げる）
  var rodSway = Math.sin(ph)*2.5; // 竿のゆらぎ
  var rShX=px+6,  rShY=nkY+4+br;
  var rElX=px+15, rElY=nkY+0+br+rodSway*0.4;
  var rHdX=px+22, rHdY=nkY-6+br+rodSway*0.7;
  sc.lineWidth=1.8;
  ln({x:rShX,y:rShY},{x:rElX,y:rElY});
  ln({x:rElX,y:rElY},{x:rHdX,y:rHdY});

  // 左腕（膝の上で休む）
  var lShX=px-4, lShY=nkY+4+br;
  var lElX=px-10,lElY=nkY+12+br;
  var lHdX=px-6, lHdY=nkY+20+br;
  ln({x:lShX,y:lShY},{x:lElX,y:lElY});
  ln({x:lElX,y:lElY},{x:lHdX,y:lHdY});

  // 脚（座り姿勢：太もも→ひざ→すね）
  sc.lineWidth=2;
  // 右脚
  var rThX=hpX+6, rThY=hpY+2+br;
  var rKnX=hpX+16,rKnY=hpY+12+br;
  var rFtX=hpX+22,rFtY=hpY+20+br;
  ln({x:hpX,y:hpY},{x:rThX,y:rThY});
  ln({x:rThX,y:rThY},{x:rKnX,y:rKnY});
  ln({x:rKnX,y:rKnY},{x:rFtX,y:rFtY});
  // 左脚
  var lThX=hpX-4, lThY=hpY+3+br;
  var lKnX=hpX+6, lKnY=hpY+14+br;
  var lFtX=hpX+14,lFtY=hpY+22+br;
  ln({x:hpX,y:hpY},{x:lThX,y:lThY});
  ln({x:lThX,y:lThY},{x:lKnX,y:lKnY});
  ln({x:lKnX,y:lKnY},{x:lFtX,y:lFtY});

  // ━━ 釣り竿 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 竿：手元(rHd)から右上方向に長くしなる
  var rodTipX = rHdX+100+rodSway;
  var rodTipY = rHdY-22+rodSway*0.3;
  // 竿を3点ベジェでしなり表現
  sc.strokeStyle=col; sc.lineWidth=1.4;
  sc.beginPath();
  sc.moveTo(rHdX, rHdY);
  sc.bezierCurveTo(
    rHdX+35, rHdY-8+rodSway*0.3,
    rHdX+70, rHdY-18+rodSway*0.5,
    rodTipX, rodTipY
  );
  sc.stroke();

  // 竿先のガイドリング（小さい丸）
  sc.strokeStyle=colA+'0.5)'; sc.lineWidth=0.8;
  circle(rodTipX, rodTipY, 2);

  // ━━ 糸 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  var lineSway = Math.sin(ph*0.7+0.5)*5;
  var lineEndX = rodTipX+18+lineSway;
  var lineEndY = 62;

  sc.strokeStyle = active
    ? 'rgba(200,169,110,0.55)'
    : 'rgba(100,95,110,0.35)';
  sc.lineWidth=0.7;
  sc.beginPath();
  sc.moveTo(rodTipX+1, rodTipY+2);
  sc.quadraticCurveTo(rodTipX+25, rodTipY+18, lineEndX, lineEndY);
  sc.stroke();

  // ━━ ウキ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  var bobY = lineEndY + Math.sin(ph*1.3)*1.2;

  // ウキ本体（楕円・上赤下白）
  sc.save();
  sc.translate(lineEndX, bobY);
  // 赤い上部
  sc.fillStyle = active ? 'rgba(210,70,50,0.9)' : 'rgba(110,80,80,0.5)';
  sc.beginPath(); sc.ellipse(0,-2.5,2.5,4,0,0,Math.PI*2); sc.fill();
  // 白い下部
  sc.fillStyle = active ? 'rgba(230,220,200,0.85)' : 'rgba(130,125,135,0.45)';
  sc.beginPath(); sc.ellipse(0,2.5,2,3.5,0,0,Math.PI*2); sc.fill();
  // ウキの細い中軸線
  sc.strokeStyle = active ? 'rgba(200,169,110,0.6)' : 'rgba(100,95,110,0.3)';
  sc.lineWidth=0.6;
  sc.beginPath(); sc.moveTo(0,-6); sc.lineTo(0,6); sc.stroke();
  sc.restore();

  // ウキの水面反射（小さな楕円）
  sc.fillStyle = active ? 'rgba(100,160,220,0.15)' : 'rgba(60,60,80,0.10)';
  sc.beginPath(); sc.ellipse(lineEndX, bobY+7, 4, 1.5, 0, 0, Math.PI*2); sc.fill();
}

(function loop(){ sT++; drawFisher(sT, isRun); requestAnimationFrame(loop); })();

// ══ Audio ═══════════════════════════════════
var actx=null,tSrc=null,tGain=null,bgGain=null,bgNodes=[];
var isOn=false,SR=44100;
function getCtx(){
  if(!actx||actx.state==='closed') actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
  return actx;
}

// トーン
function makeBuf(ctx,hz){
  var sec=2,fr=Math.round(ctx.sampleRate*sec),buf=ctx.createBuffer(1,fr,ctx.sampleRate),d=buf.getChannelData(0);
  var ef=Math.round(hz*sec)/sec;
  for(var i=0;i<fr;i++) d[i]=Math.sin(2*Math.PI*ef*i/ctx.sampleRate);
  return buf;
}
function startTone(){
  var ctx=getCtx();
  tGain=ctx.createGain(); tGain.gain.value=document.getElementById('volTone').value/100*.7; tGain.connect(ctx.destination);
  tSrc=ctx.createBufferSource(); tSrc.buffer=makeBuf(ctx,FREQS[fi].hz); tSrc.loop=true; tSrc.connect(tGain);
  ctx.resume().then(function(){tSrc.start(0);});
}
function stopTone(){if(!tSrc)return;try{tSrc.stop(0);}catch(e){}tSrc=null;tGain=null;}

// BGM
function startBgm(id){
  var ctx=getCtx();
  bgGain=ctx.createGain(); bgGain.gain.value=document.getElementById('volBgm').value/100*.5; bgGain.connect(ctx.destination);
  bgNodes=[];
  if(id==='white'||id==='brown'){
    var bs=ctx.sampleRate*4,nb=ctx.createBuffer(1,bs,ctx.sampleRate),nd=nb.getChannelData(0);
    if(id==='white'){for(var i=0;i<bs;i++)nd[i]=Math.random()*2-1;}
    else{var last=0;for(var i=0;i<bs;i++){last=(last+(Math.random()*2-1)*.02)*.998;nd[i]=Math.max(-1,Math.min(1,last*8));}}
    var ns=ctx.createBufferSource();ns.buffer=nb;ns.loop=true;
    var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=id==='white'?7000:700;
    ns.connect(lp);lp.connect(bgGain);
    ctx.resume().then(function(){ns.start(0);});bgNodes.push(ns);
  } else if(id==='rain'){
    bandNoise(ctx,bgGain,[{f:500,q:.5,g:.6},{f:1800,q:1,g:.4},{f:5000,q:2,g:.2}]);
    droplets(ctx,bgGain,16,.07);
  } else if(id==='river'){
    bandNoise(ctx,bgGain,[{f:180,q:.4,g:.5},{f:700,q:.8,g:.4},{f:2500,q:1.5,g:.25}]);
    droplets(ctx,bgGain,7,.04);
  } else if(id==='wave'){
    var bs=ctx.sampleRate*4,wb=ctx.createBuffer(1,bs,ctx.sampleRate),wd=wb.getChannelData(0);
    for(var i=0;i<bs;i++)wd[i]=Math.random()*2-1;
    var wn=ctx.createBufferSource();wn.buffer=wb;wn.loop=true;
    var lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=650;
    var wg=ctx.createGain();wg.gain.value=.5;
    var lfo=ctx.createOscillator();lfo.frequency.value=.1;
    var lg=ctx.createGain();lg.gain.value=.42;
    lfo.connect(lg);lg.connect(wg.gain);
    wn.connect(lp);lp.connect(wg);wg.connect(bgGain);
    ctx.resume().then(function(){wn.start(0);lfo.start(0);});bgNodes.push(wn,lfo);
  } else if(id==='fire'){
    // 焚き火：低域の燃焼ベース＋LFOゆらぎのみ（パチパチは別途）
    var bs=ctx.sampleRate*6,nb=ctx.createBuffer(1,bs,ctx.sampleRate),nd=nb.getChannelData(0);
    // ピンクノイズ（1/fノイズ近似）で自然な燃焼音
    var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(var i=0;i<bs;i++){
      var w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      nd[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+w*0.5362)*0.11));
    }
    var fn1=ctx.createBufferSource(); fn1.buffer=nb; fn1.loop=true;
    // 600Hz以下だけ通す（煤けた燃焼音）
    var lp1=ctx.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=550; lp1.Q.value=0.5;
    var fg1=ctx.createGain(); fg1.gain.value=0.9;
    // ゆったりした炎のゆらぎ
    var flfo=ctx.createOscillator(); flfo.type='sine'; flfo.frequency.value=0.08;
    var flfoG=ctx.createGain(); flfoG.gain.value=0.35;
    flfo.connect(flfoG); flfoG.connect(fg1.gain);
    fn1.connect(lp1); lp1.connect(fg1); fg1.connect(bgGain);
    ctx.resume().then(function(){ fn1.start(0); flfo.start(0); });
    bgNodes.push(fn1,flfo);
    crackle(ctx,bgGain);

  } else if(id==='green'){
    // グリーンノイズ：500〜800Hz中心・自然界に最も近い帯域
    var bs=ctx.sampleRate*4,nb=ctx.createBuffer(1,bs,ctx.sampleRate),nd=nb.getChannelData(0);
    // ピンクノイズベースで生成
    var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(var i=0;i<bs;i++){
      var w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      nd[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+w*0.5362)*0.11));
    }
    var ns=ctx.createBufferSource(); ns.buffer=nb; ns.loop=true;
    // 500〜900Hzのピークを作るピーキングEQ
    var pk=ctx.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=650; pk.Q.value=0.8; pk.gain.value=10;
    // 200Hz以下と3000Hz以上をカット
    var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=180; hp.Q.value=0.5;
    var lp=ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=3200; lp.Q.value=0.5;
    var gn=ctx.createGain(); gn.gain.value=1.1;
    ns.connect(hp); hp.connect(pk); pk.connect(lp); lp.connect(gn); gn.connect(bgGain);
    ctx.resume().then(function(){ ns.start(0); });
    bgNodes.push(ns);

  } else if(id==='forest'){
    // 森の音：風（葉ずれ）のみ＋鳥＋虫（水系ゼロ）
    var bs=ctx.sampleRate*6,wb=ctx.createBuffer(1,bs,ctx.sampleRate),wd=wb.getChannelData(0);
    // ピンクノイズで自然な風音
    var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(var i=0;i<bs;i++){
      var w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      wd[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+w*0.5362)*0.11));
    }
    // 葉ずれ：1000〜3000Hz帯域
    var wn1=ctx.createBufferSource(); wn1.buffer=wb; wn1.loop=true;
    var bp1=ctx.createBiquadFilter(); bp1.type='bandpass'; bp1.frequency.value=1600; bp1.Q.value=1.2;
    var gL=ctx.createGain(); gL.gain.value=0.45;
    var lfo1=ctx.createOscillator(); lfo1.type='sine'; lfo1.frequency.value=0.05;
    var lg1=ctx.createGain(); lg1.gain.value=0.3;
    lfo1.connect(lg1); lg1.connect(gL.gain);
    wn1.connect(bp1); bp1.connect(gL); gL.connect(bgGain);
    // 風の息づかい：80〜250Hz　ゆっくり強弱
    var wn2=ctx.createBufferSource(); wn2.buffer=wb; wn2.loop=true;
    var bp2=ctx.createBiquadFilter(); bp2.type='bandpass'; bp2.frequency.value=140; bp2.Q.value=0.5;
    var gW=ctx.createGain(); gW.gain.value=0.18;
    var lfo2=ctx.createOscillator(); lfo2.type='sine'; lfo2.frequency.value=0.03;
    var lg2=ctx.createGain(); lg2.gain.value=0.12;
    lfo2.connect(lg2); lg2.connect(gW.gain);
    wn2.connect(bp2); bp2.connect(gW); gW.connect(bgGain);
    ctx.resume().then(function(){ wn1.start(0); wn2.start(0); lfo1.start(0); lfo2.start(0); });
    bgNodes.push(wn1,wn2,lfo1,lfo2);
    chirps(ctx,bgGain);
    insects(ctx,bgGain);
  } else if(id==='bowl'){
    var bHz=FREQS[fi].hz;
    [1,2.76,5.4].forEach(function(ratio,ri){
      var fq=bHz*ratio; if(fq>18000)return;
      var sb=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate),sd=sb.getChannelData(0);
      var dr=.00012*(ri+1);
      for(var i=0;i<sb.length;i++) sd[i]=Math.sin(2*Math.PI*fq*i/ctx.sampleRate)*Math.exp(-dr*i)*(.55-ri*.15);
      var ss=ctx.createBufferSource();ss.buffer=sb;ss.loop=true;ss.connect(bgGain);
      ctx.resume().then(function(){ss.start(0);});bgNodes.push(ss);
    });
  }
}
function bandNoise(ctx,dest,bands){
  var bs=ctx.sampleRate*4,nb=ctx.createBuffer(1,bs,ctx.sampleRate),nd=nb.getChannelData(0);
  for(var i=0;i<bs;i++)nd[i]=Math.random()*2-1;
  bands.forEach(function(b){
    var ns=ctx.createBufferSource();ns.buffer=nb;ns.loop=true;
    var bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=b.f;bp.Q.value=b.q;
    var gn=ctx.createGain();gn.gain.value=b.g;
    ns.connect(bp);bp.connect(gn);gn.connect(dest);
    ctx.resume().then(function(){ns.start(0);});bgNodes.push(ns);
  });
}
function droplets(ctx,dest,rate,vol){
  var iv=setInterval(function(){
    if(!bgGain){clearInterval(iv);return;}
    var t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=700+Math.random()*1400;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
    o.connect(g);g.connect(dest);o.start(t);o.stop(t+.1);
  },1000/rate);
  bgNodes.push({stop:function(){clearInterval(iv);}});
}
function crackle(ctx,dest){
  // 焚き火のパチパチ：不規則な短いバースト
  var iv=setInterval(function(){
    if(!bgGain){clearInterval(iv);return;}
    if(Math.random()>.55)return;
    var t=ctx.currentTime;
    var bursts=1+Math.floor(Math.random()*3);
    for(var b=0;b<bursts;b++){
      var bs2=Math.floor(ctx.sampleRate*0.04);
      var nb2=ctx.createBuffer(1,bs2,ctx.sampleRate);
      var nd2=nb2.getChannelData(0);
      for(var i=0;i<bs2;i++) nd2[i]=(Math.random()*2-1)*Math.exp(-i/(bs2*0.3));
      var src=ctx.createBufferSource(); src.buffer=nb2;
      var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800+Math.random()*1200;
      var g=ctx.createGain(); g.gain.value=0.15+Math.random()*0.2;
      src.connect(hp); hp.connect(g); g.connect(dest);
      var bt=t+b*(0.02+Math.random()*0.06);
      src.start(bt);
    }
  },180+Math.random()*120);
  bgNodes.push({stop:function(){clearInterval(iv);}});
}
function chirps(ctx,dest){
  var iv=setInterval(function(){
    if(!bgGain){clearInterval(iv);return;}
    if(Math.random()>.35)return;
    var t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    var bf=2200+Math.random()*1800;
    o.frequency.setValueAtTime(bf,t);o.frequency.linearRampToValueAtTime(bf*1.25,t+.06);
    g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
    o.connect(g);g.connect(dest);o.start(t);o.stop(t+.16);
  },320);
  bgNodes.push({stop:function(){clearInterval(iv);}});
}
function insects(ctx,dest){
  // 虫：3〜6kHz の短い連続パルス（コオロギ・セミ風）
  var iv=setInterval(function(){
    if(!bgGain){clearInterval(iv);return;}
    if(Math.random()>.45)return;
    var t=ctx.currentTime;
    var pulses=2+Math.floor(Math.random()*3);
    for(var p=0;p<pulses;p++){
      var o=ctx.createOscillator(),g=ctx.createGain();
      var bf=3500+Math.random()*2000;
      o.frequency.value=bf;
      var pt=t+p*0.04;
      g.gain.setValueAtTime(0,pt);
      g.gain.linearRampToValueAtTime(.03,pt+.01);
      g.gain.exponentialRampToValueAtTime(.001,pt+.035);
      o.connect(g);g.connect(dest);o.start(pt);o.stop(pt+.04);
    }
  },600);
  bgNodes.push({stop:function(){clearInterval(iv);}});
}
function stopBgm(){
  bgNodes.forEach(function(n){try{if(n.stop)n.stop(0);}catch(e){}});
  bgNodes=[];bgGain=null;
}

// ══ 再生/停止 ════════════════════════════════
document.getElementById('playBtn').addEventListener('click',function(){
  if(isOn){
    isOn=false;isRun=false;this.classList.remove('on');
    stopTimer();stopTone();stopBgm();
    document.getElementById('msg').textContent='停止';
  } else {
    isOn=true;isRun=true;this.classList.add('on');
    startTone();
    if(curBgm!=='none')startBgm(curBgm);
    if(chosenMin)startTimer(chosenMin);
    document.getElementById('msg').textContent='再生中 ♪  '+FREQS[fi].hz+' Hz';
  }
});

// ══ 音量 ════════════════════════════════════
var vT=document.getElementById('volTone');
vT.addEventListener('input',function(){this.style.setProperty('--p',this.value+'%');if(tGain)tGain.gain.value=this.value/100*.7;});
vT.style.setProperty('--p','75%');
var vB=document.getElementById('volBgm');
vB.addEventListener('input',function(){this.style.setProperty('--p',this.value+'%');if(bgGain)bgGain.gain.value=this.value/100*.5;});
vB.style.setProperty('--p','40%');

// ══ タイマー ════════════════════════════════
var timerEnd=null,timerTick=null,chosenMin=null;
function startTimer(min){
  stopTimer();timerEnd=Date.now()+min*60000;
  timerTick=setInterval(function(){
    var rem=timerEnd-Date.now();
    if(rem<=0){stopTimer();isOn=false;isRun=false;document.getElementById('playBtn').classList.remove('on');stopTone();stopBgm();document.getElementById('msg').textContent='タイマー終了';return;}
    var m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    document.getElementById('cd').textContent=('0'+m).slice(-2)+' : '+('0'+s).slice(-2);
  },500);
}
function stopTimer(){clearInterval(timerTick);timerTick=null;timerEnd=null;document.getElementById('cd').textContent='';}
document.querySelectorAll('.tb').forEach(function(btn){
  btn.addEventListener('click',function(){
    var min=parseInt(this.dataset.min);
    document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
    if(chosenMin===min){chosenMin=null;stopTimer();}
    else{this.classList.add('on');chosenMin=min;if(isOn)startTimer(min);else document.getElementById('cd').textContent=('0'+min).slice(-2)+' : 00';}
  });
});

// ══ PWA ═════════════════════════════════════
var dP=null,isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
var isSA=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dP=e;});
document.getElementById('addBtn').addEventListener('click',function(){
  if(isSA){alert('すでにホーム画面に追加されています');return;}
  if(dP){dP.prompt();dP.userChoice.then(function(){dP=null;});}
  else if(isIOS){document.getElementById('iosBanner').classList.add('show');}
  else{alert('ブラウザのメニューから「ホーム画面に追加」を選択してください');}
});
document.getElementById('iosClose').addEventListener('click',function(){document.getElementById('iosBanner').classList.remove('show');});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
